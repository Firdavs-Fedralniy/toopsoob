<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="stats.css">
    <title>My Stats</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

    <div class="mystats__page">

        <!-- ПРОФИЛЬ СВЕРХУ -->
        <div class="profile">
            <div class="user__img prof">
                <img id="ms-avatar" src="as.png" alt="">
            </div>
            <p class="profile__nick" id="ms-name">—</p>
        </div>

        <!-- КНОПКИ ПЕРИОД -->
        <div class="period__toggle">
            <button class="period__btn active" id="btn-week" onclick="setPeriod('week')">неделя</button>
            <button class="period__btn" id="btn-day" onclick="setPeriod('day')">сегодня</button>
        </div>

        <!-- ГРАФИК -->
        <div class="chart__wrap">
            <canvas id="statsChart"></canvas>
        </div>

        <!-- КАРТОЧКИ -->
        <div class="mystats__summary">
            <div class="stat__card">
                <span class="stat__label">сегодня</span>
                <span class="stat__value" id="ms-today">—</span>
            </div>
            <div class="stat__card">
                <span class="stat__label">за неделю</span>
                <span class="stat__value" id="ms-week">—</span>
            </div>
            <div class="stat__card">
                <span class="stat__label">всего</span>
                <span class="stat__value" id="ms-total">—</span>
            </div>
        </div>
    </div>

    <div class="down">
        <div class="chat__top">
            <a href="./index.html" class="nav__item">
                <img src="./fc321c0c-e1e4-4d57-9ce4-918e9e22e470_removalai_preview.png" class="chat__icon">
                <p>Chat Top</p>
            </a>
            <a href="./mystats.html" class="nav__item active">
                <img src="./fc321c0c-e1e4-4d57-9ce4-918e9e22e470_removalai_preview.png" class="chat__icon">
                <p>My Stats</p>
            </a>
            <a href="./profile.html" class="nav__item">
                <img src="./fc321c0c-e1e4-4d57-9ce4-918e9e22e470_removalai_preview.png" class="chat__icon">
                <p>Profile</p>
            </a>
        </div>
    </div>

    <script src="./stats.js"></script>
</body>
</html>
